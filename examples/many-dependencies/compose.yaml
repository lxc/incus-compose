name: many-dependencies

x-incus-compose:
  healthd:
    # This is needed cause this project has no "default" network.
    network: :internal

x-service-templates:
  nginx: &nginx
    image: docker.io/nginxinc/nginx-unprivileged:alpine
    restart: unless-stopped
    environment:
      NGINX_WORKER_PROCESSES: ${NGINX_WORKER_PROCESSES}
    x-incus:
      limits.cpu: 1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_interval: 5s
      start_period: 1m

services:
  gateway:
    <<: *nginx
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - public

  frontend:
    <<: *nginx
    environment:
      API_URL: http://api:8080
    depends_on:
      api:
        condition: service_healthy
    networks:
      - public
      - internal

  api:
    <<: *nginx
    environment:
      AUTH_URL: http://auth:8080
      USERS_URL: http://users:8080
      PRODUCTS_URL: http://products:8080
      ORDERS_URL: http://orders:8080
      CACHE_HOST: cache
    depends_on:
      auth:
        condition: service_healthy
      users:
        condition: service_healthy
      products:
        condition: service_healthy
      orders:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - public
      - internal

  auth:
    <<: *nginx
    environment:
      DB_HOST: auth-db
      DB_NAME: auth
      DB_USER: auth_user
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      CACHE_HOST: cache
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      auth-db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - internal
      - auth-net

  users:
    <<: *nginx
    environment:
      DB_HOST: users-db
      DB_NAME: users
      DB_USER: users_user
      DB_PASSWORD: ${USERS_DB_PASSWORD}
      CACHE_HOST: cache
    depends_on:
      users-db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - internal
      - users-net

  products:
    <<: *nginx
    environment:
      DB_HOST: products-db
      DB_NAME: products
      DB_USER: products_user
      DB_PASSWORD: ${PRODUCTS_DB_PASSWORD}
      CACHE_HOST: cache
      SEARCH_URL: http://search:8080
    depends_on:
      products-db:
        condition: service_healthy
      cache:
        condition: service_healthy
      search:
        condition: service_healthy
    networks:
      - internal
      - products-net

  orders:
    <<: *nginx
    environment:
      DB_HOST: orders-db
      DB_NAME: orders
      DB_USER: orders_user
      DB_PASSWORD: ${ORDERS_DB_PASSWORD}
      USERS_URL: http://users:8080
      PRODUCTS_URL: http://products:8080
      QUEUE_HOST: queue
    depends_on:
      orders-db:
        condition: service_healthy
      users:
        condition: service_healthy
      products:
        condition: service_healthy
      queue:
        condition: service_healthy
    networks:
      - internal
      - orders-net

  notifications:
    <<: *nginx
    environment:
      USERS_URL: http://users:8080
      QUEUE_HOST: queue
      MAILER_HOST: mailer
    depends_on:
      queue:
        condition: service_healthy
      users:
        condition: service_healthy
      mailer:
        condition: service_healthy
    networks:
      - internal

  mailer:
    <<: *nginx
    environment:
      QUEUE_HOST: queue
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
    depends_on:
      queue:
        condition: service_healthy
    networks:
      - internal

  worker:
    <<: *nginx
    environment:
      QUEUE_HOST: queue
      DB_HOST: orders-db
      DB_NAME: orders
      DB_USER: orders_user
      DB_PASSWORD: ${ORDERS_DB_PASSWORD}
    deploy:
      replicas: 3
    depends_on:
      queue:
        condition: service_healthy
      orders-db:
        condition: service_healthy
    networks:
      - internal
      - orders-net

  search:
    <<: *nginx
    environment:
      DB_HOST: search-db
    depends_on:
      search-db:
        condition: service_healthy
    networks:
      - internal
      - search-net

  auth-db:
    <<: *nginx
    volumes:
      - auth-db-data:/var/lib/data
    networks:
      - auth-net

  users-db:
    <<: *nginx
    volumes:
      - users-db-data:/var/lib/data
    networks:
      - users-net

  products-db:
    <<: *nginx
    volumes:
      - products-db-data:/var/lib/data
    networks:
      - products-net

  orders-db:
    <<: *nginx
    volumes:
      - orders-db-data:/var/lib/data
    networks:
      - orders-net

  search-db:
    <<: *nginx
    volumes:
      - search-db-data:/var/lib/data
    networks:
      - search-net

  cache:
    <<: *nginx
    volumes:
      - cache-data:/var/lib/data
    networks:
      - internal

  queue:
    <<: *nginx
    volumes:
      - queue-data:/var/lib/data
    networks:
      - internal

volumes:
  auth-db-data:
  users-db-data:
  products-db-data:
  orders-db-data:
  search-db-data:
  cache-data:
  queue-data:

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
  auth-net:
    driver: bridge
    internal: true
  users-net:
    driver: bridge
    internal: true
  products-net:
    driver: bridge
    internal: true
  orders-net:
    driver: bridge
    internal: true
  search-net:
    driver: bridge
    internal: true
