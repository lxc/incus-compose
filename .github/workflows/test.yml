name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # https://stackoverflow.com/a/79780883/3368468
  GOTOOLCHAIN: "go1.26.0+auto"
  REPORTS_DIR: reports

jobs:
  lint:
    runs-on: [self-hosted, incus-compose]
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: go mod tidy -diff
        run: go mod tidy -v -diff

      - name: golangci-lint
        # Writes the SARIF file even when issues are found, then exits non-zero.
        run: golangci-lint run --output.sarif.path=gl-code-quality-report.sarif

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gl-code-quality-report.sarif
          category: golangci-lint

  test:
    needs: lint
    runs-on: [self-hosted, incus-compose]
    permissions:
      contents: read
      checks: write # publish JUnit results as a check run
    env:
      INCUS_REMOTE: ict
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Test
        run: |
          mkdir -p "$REPORTS_DIR"
          go mod tidy -v -diff
          set -o pipefail
          NO_COLOR=1 go test ./... -count=1 -v -cover \
            -coverprofile="$REPORTS_DIR/go-test-coverage.txt" 2>&1 \
            | tee "$REPORTS_DIR/go-test-results.txt"

      - name: Generate JUnit and coverage reports
        if: always()
        run: |
          if [[ -s "$REPORTS_DIR/go-test-results.txt" ]]; then
            go install github.com/jstemmer/go-junit-report/v2@latest
            "$(go env GOPATH)/bin/go-junit-report" \
              -in "$REPORTS_DIR/go-test-results.txt" -out "$REPORTS_DIR/junit.xml"
          fi
          if [[ -s "$REPORTS_DIR/go-test-coverage.txt" ]]; then
            go install gitlab.com/adiproject/gocover-report@latest
            "$(go env GOPATH)/bin/gocover-report" \
              -cobertura="$REPORTS_DIR/cobertura.xml" "$REPORTS_DIR/go-test-coverage.txt"
          fi

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Go Tests (ict)
          path: ${{ env.REPORTS_DIR }}/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: go-test-reports
          path: ${{ env.REPORTS_DIR }}
          if-no-files-found: ignore

  test-custom:
    needs: lint
    runs-on: [self-hosted, incus-compose]
    permissions:
      contents: read
      checks: write # publish JUnit results as a check run
    env:
      INCUS_REMOTE: ict-custom
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Test
        run: |
          mkdir -p "$REPORTS_DIR"
          go mod tidy -v -diff
          set -o pipefail
          NO_COLOR=1 go test ./... -count=1 -v -cover \
            -coverprofile="$REPORTS_DIR/go-test-coverage.txt" 2>&1 \
            | tee "$REPORTS_DIR/go-test-results.txt"

      - name: Generate JUnit and coverage reports
        if: always()
        run: |
          if [[ -s "$REPORTS_DIR/go-test-results.txt" ]]; then
            go install github.com/jstemmer/go-junit-report/v2@latest
            "$(go env GOPATH)/bin/go-junit-report" \
              -in "$REPORTS_DIR/go-test-results.txt" -out "$REPORTS_DIR/junit.xml"
          fi
          if [[ -s "$REPORTS_DIR/go-test-coverage.txt" ]]; then
            go install gitlab.com/adiproject/gocover-report@latest
            "$(go env GOPATH)/bin/gocover-report" \
              -cobertura="$REPORTS_DIR/cobertura.xml" "$REPORTS_DIR/go-test-coverage.txt"
          fi

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Go Tests (ict-custom)
          path: ${{ env.REPORTS_DIR }}/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: go-test-custom-reports
          path: ${{ env.REPORTS_DIR }}
          if-no-files-found: ignore
