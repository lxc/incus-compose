name: nginx-proxy

services:
  nginx:
    image: docker.io/nginxinc/nginx-unprivileged:alpine
    restart: unless-stopped
    environment:
      NGINX_WORKER_PROCESSES: 1
    ports:
      - "8080:8080"
    depends_on:
      backend1:
        condition: service_healthy
      backend2:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend1:
    image: docker.io/nginxinc/nginx-unprivileged:alpine
    restart: unless-stopped
    environment:
      NGINX_WORKER_PROCESSES: 1
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend2:
    image: docker.io/nginxinc/nginx-unprivileged:alpine
    restart: unless-stopped
    environment:
      NGINX_WORKER_PROCESSES: 1
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
