services:
  web:
    image: docker.io/nginx:alpine
    environment:
      NGINX_WORKER_PROCESSES: 1
    x-incus:
      limits.memory: 1024MB
      limits.cpu: "2"
      security.nesting: "false"

  database:
    image: docker.io/nginx:alpine
    environment:
      NGINX_WORKER_PROCESSES: 1
    x-incus:
      limits.memory: 1GB
      limits.cpu: "4"
