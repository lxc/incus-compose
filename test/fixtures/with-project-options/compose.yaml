x-incus:
  # https://linuxcontainers.org/incus/docs/main/reference/instance_options/#instance-options-limits-cpu-container
  limits.cpu: "5" # +1 for healthd
  limits.memory: 2149MB # +100 for healthd, +1 MiB for calc.
  limits.virtual-machines: 0

services:
  web:
    image: docker.io/nginx:alpine
    environment:
      NGINX_WORKER_PROCESSES: 1
    deploy:
      replicas: 4
    x-incus:
      limits.cpu: "1"
      limits.memory: 512MB
