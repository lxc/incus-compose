services:
  immich-server:
    image: docker.io/pcdummy/immich-server:${IMMICH_VERSION:-release}
    ports: !reset []
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD", "/usr/src/app/server/bin/immich-healthcheck"]
    networks:
      default:
        ipv4_address: 10.131.32.17

  immich-machine-learning:
    image: docker.io/pcdummy/immich-machine-learning:${IMMICH_VERSION:-release}
    healthcheck:
      test: ["CMD", "python3", "/usr/src/healthcheck.py"]

  database:
    image: docker.io/pcdummy/immich-postgres:14-vectorchord0.4.3-pgvectors0.2.0
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  default:
    x-incus:
      ipv4.address: 10.131.32.1/24
